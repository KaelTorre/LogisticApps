name: Build releases (Windows + Android)

# Disparo manual: Actions -> "Build releases (Windows + Android)" ->
# Run workflow, eligiendo la rama. No corre en cada push para no gastar
# minutos de CI en builds que nadie pidió.
on:
  workflow_dispatch:

defaults:
  run:
    working-directory: sistema-optimizacion-rutas

jobs:
  windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Windows release
        run: flutter build windows --release

      # flutter build windows no empaqueta el runtime de Visual C++
      # (VCRUNTIME140.dll, VCRUNTIME140_1.dll, MSVCP140.dll) -- el .exe
      # depende de que el equipo destino ya lo tenga instalado, y si no,
      # falla con "no se encontró VCRUNTIME140.dll" al abrirlo. Se copian
      # acá las DLLs redistribuibles del propio runner (ilammy/msvc-dev-cmd
      # expone VCToolsRedistDir) para que el .zip funcione en cualquier
      # Windows sin instalar nada aparte.
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Bundle Visual C++ runtime DLLs
        shell: pwsh
        run: |
          $dest = "build/windows/x64/runner/Release"
          $crtDir = Get-ChildItem -Path "$env:VCToolsRedistDir\x64" -Directory -Filter "Microsoft.VC*.CRT" | Select-Object -First 1
          foreach ($dll in "vcruntime140.dll", "vcruntime140_1.dll", "msvcp140.dll") {
            Copy-Item -Path (Join-Path $crtDir.FullName $dll) -Destination $dest -Force
          }
          Get-ChildItem $dest -Filter "*.dll" | Select-Object Name

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sistema-optimizacion-rutas-windows
          path: sistema-optimizacion-rutas/build/windows/x64/runner/Release/
          if-no-files-found: error

  android:
    name: Android (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # APK firmado con la key de debug (ver android/app/build.gradle.kts):
      # instalable directo en cualquier equipo ("orígenes desconocidos"),
      # suficiente para demo/curso. Para publicar en Play Store haría falta
      # una key de release propia.
      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sistema-optimizacion-rutas-android
          path: sistema-optimizacion-rutas/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
