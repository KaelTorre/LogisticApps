name: Build releases - Gestion Pedidos SLA (Windows + Android)

# Disparo manual: Actions -> "Build releases - Gestion Pedidos SLA (Windows +
# Android)" -> Run workflow, eligiendo la rama. No corre en cada push para no
# gastar minutos de CI en builds que nadie pidió.
on:
  workflow_dispatch:

defaults:
  run:
    working-directory: sistema-gestion-pedidos-sla

jobs:
  windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sistema-gestion-pedidos-sla-windows
          path: sistema-gestion-pedidos-sla/build/windows/x64/runner/Release/
          if-no-files-found: error

  android:
    name: Android (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # APK firmado con la key de debug (ver android/app/build.gradle.kts):
      # instalable directo en cualquier equipo ("orígenes desconocidos"),
      # suficiente para demo/curso. Para publicar en Play Store haría falta
      # una key de release propia.
      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sistema-gestion-pedidos-sla-android
          path: sistema-gestion-pedidos-sla/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
