name: Build releases - Gestion Pedidos SLA (Windows + Android)

# Disparo manual: Actions -> "Build releases - Gestion Pedidos SLA (Windows +
# Android)" -> Run workflow, eligiendo la rama. No corre en cada push para no
# gastar minutos de CI en builds que nadie pidió.
on:
  workflow_dispatch:

defaults:
  run:
    working-directory: sistema-gestion-pedidos-sla

jobs:
  windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Windows release
        run: flutter build windows --release

      # flutter build windows no empaqueta el runtime de Visual C++
      # (VCRUNTIME140.dll, VCRUNTIME140_1.dll, MSVCP140.dll) -- el .exe
      # depende de que el equipo destino ya lo tenga instalado, y si no,
      # falla con "no se encontró VCRUNTIME140.dll" al abrirlo. Se copian
      # acá las DLLs redistribuibles del propio runner (ilammy/msvc-dev-cmd
      # expone VCToolsRedistDir) para que el .exe funcione en cualquier
      # Windows sin instalar nada aparte.
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Bundle Visual C++ runtime DLLs
        shell: pwsh
        run: |
          $dest = "build/windows/x64/runner/Release"
          $crtDir = Get-ChildItem -Path "$env:VCToolsRedistDir\x64" -Directory -Filter "Microsoft.VC*.CRT" | Select-Object -First 1
          foreach ($dll in "vcruntime140.dll", "vcruntime140_1.dll", "msvcp140.dll") {
            Copy-Item -Path (Join-Path $crtDir.FullName $dll) -Destination $dest -Force
          }
          Get-ChildItem $dest -Filter "*.dll" | Select-Object Name

      # Un solo .exe portable en vez de repartir la carpeta Release/ entera
      # como zip: se arma concatenando el módulo SFX de 7-Zip (7z.sfx, ya
      # trae 7-Zip preinstalado en windows-latest pero NO el módulo SFX --
      # se saca del propio instalador oficial descargado acá) + un config
      # con la directiva RunProgram + el .7z comprimido de Release/. Al
      # ejecutarlo, se autoextrae a una carpeta temporal y arranca la app
      # sola, sin instalador ni pedir permisos de administrador.
      - name: Bundle into a single portable .exe
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.7-zip.org/a/7z2301-x64.exe" -OutFile "7z-installer.exe"
          & "C:\Program Files\7-Zip\7z.exe" e "7z-installer.exe" "7z.sfx" -o"sfx" -y

          # Pararse DENTRO de Release/ antes de comprimir: si no, 7z guarda
          # la ruta completa "build\windows\x64\runner\Release\..." en el
          # archivo, y al autoextraerse aparece esa carpeta anidada entera
          # en vez de soltar el .exe y las DLLs directo donde lo corriste.
          $origDir = Get-Location
          Push-Location "build\windows\x64\runner\Release"
          & "C:\Program Files\7-Zip\7z.exe" a -mx=9 "$origDir\release.7z" *
          Pop-Location

          $configLines = @(
            ';!@Install@!UTF-8!',
            'Title="Sistema de Gestion de Pedidos SLA"',
            'RunProgram="sistema_gestion_pedidos_sla.exe"',
            ';!@InstallEnd@!'
          )
          Set-Content -Path "config.txt" -Value $configLines -Encoding UTF8

          cmd /c copy /b "sfx\7z.sfx" + "config.txt" + "release.7z" "sistema-gestion-pedidos-sla-portable.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sistema-gestion-pedidos-sla-windows-portable
          path: sistema-gestion-pedidos-sla/sistema-gestion-pedidos-sla-portable.exe
          if-no-files-found: error

  android:
    name: Android (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # APK firmado con la key de debug (ver android/app/build.gradle.kts):
      # instalable directo en cualquier equipo ("orígenes desconocidos"),
      # suficiente para demo/curso. Para publicar en Play Store haría falta
      # una key de release propia.
      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sistema-gestion-pedidos-sla-android
          path: sistema-gestion-pedidos-sla/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
